name: Create Release & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Extract commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --oneline --format="- %s")
          fi

          RELEASE_NOTES="# WinHarden Release ${{ steps.version.outputs.tag }}

          ## Installation

          ### PowerShell Gallery
          \`\`\`powershell
          Install-Module -Name WinHarden -RequiredVersion ${{ steps.version.outputs.version }}
          \`\`\`

          ### Manual Download
          Download the ZIP file below and extract to your preferred location.

          ## Recent Changes
          $COMMITS

          ## Documentation
          - [User Guide](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/01_USER_GUIDE.md)
          - [Deployment Guide](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/02_DEPLOYMENT_GUIDE.md)
          - [Architecture](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/03_ARCHITECTURE.md)

          **Status:** Production Ready (Grade A+)"

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          mkdir -p release
          cd release
          # Create clean copy without git files
          rsync -av ../ . \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='node_modules' \
            --exclude='*.log' || true

          # Copy important docs
          cp ../README.md . 2>/dev/null || true
          cp ../LICENSE . 2>/dev/null || true

          # Create archive
          cd ..
          zip -r WinHarden-${{ steps.version.outputs.tag }}.zip release/ -q
          ls -lh WinHarden-${{ steps.version.outputs.tag }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WinHarden ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          files: WinHarden-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PowerShell Gallery
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.2'

      - name: Run PowerShell Publishing Script
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Write-Host "Publishing to PowerShell Gallery..."
          Write-Host "Version: ${{ steps.version.outputs.version }}"

          if ([string]::IsNullOrEmpty($env:PSGALLERY_API_KEY)) {
            Write-Host "⚠ PSGALLERY_API_KEY not set - skipping PowerShell Gallery publishing"
            Write-Host "To enable: Add PSGALLERY_API_KEY secret to GitHub repository"
            exit 0
          }

          # Run publish script with API key
          .\Publish-ToGallery.ps1 `
            -NuGetApiKey "$env:PSGALLERY_API_KEY" `
            -ModulePath "." `
            -ErrorAction Stop

          Write-Host "Publishing to PowerShell Gallery completed!"

      - name: Verify PowerShell Gallery Publication
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:PSGALLERY_API_KEY)) {
            Write-Host "Skipping verification - PSGALLERY_API_KEY not set"
            exit 0
          }

          Write-Host "Waiting for PSGallery indexing (30 seconds)..."
          Start-Sleep -Seconds 30

          Write-Host "Checking PowerShell Gallery for module..."
          $module = Find-Module -Name WinHarden -Repository PSGallery -ErrorAction SilentlyContinue

          if ($module) {
            Write-Host "✓ Module found on PowerShell Gallery!"
            Write-Host "  Name: $($module.Name)"
            Write-Host "  Version: $($module.Version)"
            Write-Host "  Published: $($module.PublishedDate)"
          } else {
            Write-Host "⚠ Module not yet indexed on PowerShell Gallery (may take 5-10 minutes)"
            Write-Host "Check: https://www.powershellgallery.com/packages/WinHarden"
          }

      - name: Notify Completion
        run: |
          echo "Release ${{ steps.version.outputs.tag }} published successfully!"
          echo ""
          echo "Available at:"
          echo "  - GitHub Release: https://github.com/ZulshiBLN/WinHarden/releases/tag/${{ steps.version.outputs.tag }}"
          echo "  - PowerShell Gallery: https://www.powershellgallery.com/packages/WinHarden/${{ steps.version.outputs.version }}"
          echo ""
          echo "Installation:"
          echo "  Install-Module -Name WinHarden -RequiredVersion ${{ steps.version.outputs.version }}"
