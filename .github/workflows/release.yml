name: Create Release & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Extract commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --oneline --format="- %s")
          fi

          RELEASE_NOTES="# WinHarden Release ${{ steps.version.outputs.tag }}

          ## Installation

          ### PowerShell Gallery
          \`\`\`powershell
          Install-Module -Name WinHarden -RequiredVersion ${{ steps.version.outputs.version }}
          \`\`\`

          ### Manual Download
          Download the ZIP file below and extract to your preferred location.

          ## Recent Changes
          $COMMITS

          ## Documentation
          - [User Guide](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/01_USER_GUIDE.md)
          - [Deployment Guide](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/02_DEPLOYMENT_GUIDE.md)
          - [Architecture](https://github.com/ZulshiBLN/WinHarden/blob/main/docs/hardening/03_ARCHITECTURE.md)

          **Status:** Production Ready (Grade A+)"

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          mkdir -p release
          cd release
          # Create clean copy without git files
          rsync -av ../ . \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='node_modules' \
            --exclude='*.log' || true

          # Copy important docs
          cp ../README.md . 2>/dev/null || true
          cp ../LICENSE . 2>/dev/null || true

          # Create archive
          cd ..
          zip -r WinHarden-${{ steps.version.outputs.tag }}.zip release/ -q
          ls -lh WinHarden-${{ steps.version.outputs.tag }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WinHarden ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          files: WinHarden-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PowerShell Gallery
        run: |
          # This step requires manual trigger for now
          # To publish: .\Publish-ToGallery.ps1 -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }}
          echo "To publish to PowerShell Gallery:"
          echo "Run: .\Publish-ToGallery.ps1 -NuGetApiKey \$env:PSGALLERY_API_KEY"
          echo "Requires: PSGALLERY_API_KEY secret in GitHub repository settings"

      - name: Notify Completion
        run: |
          echo "Release ${{ steps.version.outputs.tag }} created successfully!"
          echo "GitHub Release: https://github.com/ZulshiBLN/WinHarden/releases/tag/${{ steps.version.outputs.tag }}"
          echo ""
          echo "Next step: Manually publish to PowerShell Gallery"
          echo "  1. Get API key from https://www.powershellgallery.com/account/apikeys"
          echo "  2. Run: .\Publish-ToGallery.ps1 -NuGetApiKey <API_KEY>"
